  <style>
    :root {
      --bg: #faf9f7;
      --bg-card: #ffffff;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --accent: #8b7355;
      --accent-hover: #6d5a42;
      --border: #e8e6e3;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 顶部 Tab 导航 */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      gap: 48px;
      justify-content: center;
    }

    .tab {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 0;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    /* 内容区域 */
    main {
      padding: 0;
    }

    .panel {
      padding: 48px 0 80px;
    }

    #articles.panel {
      padding: 24px 0 48px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 表情包网格 */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 32px;
    }

    .sticker-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .sticker-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .sticker-cover-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .sticker-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sticker-qrcode {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sticker-cover-wrap:hover .sticker-qrcode {
      opacity: 1;
    }

    .sticker-qrcode img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .sticker-title {
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
    }

    /* 文章列表 */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .article-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .article-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .article-card-inner {
      display: flex;
      gap: 20px;
      padding: 10px;
    }

    .article-card-cover {
      flex-shrink: 0;
      width: 180px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--border);
      position: relative;
    }

    .article-card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .article-card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
      background: linear-gradient(135deg, #e8e6e3 0%, #f0eeeb 100%);
    }

    .article-card-meta {
      flex: 1;
      min-width: 0;
    }

    .article-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .article-card-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-card-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .article-card-inner {
        flex-direction: column;
      }

      .article-card-cover {
        width: 100%;
        height: 160px;
      }
    }

    /* 联系我 */

      text-align: center;
      padding: 60px 24px;

    .contact-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .contact-email {
      font-size: 20px;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--accent-hover);
    }

    @media (max-width: 600px) {
      .tabs {
        gap: 32px;
      }

      .tab {
        font-size: 16px;
      }

      .sticker-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }
  </style>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tabId);
      });
      document.querySelectorAll('.panel').forEach(p => {
        p.classList.toggle('active', p.id === tabId);
      });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        switchTab(tab.dataset.tab);
        history.replaceState(null, '', tab.dataset.tab ? '#' + tab.dataset.tab : location.pathname);
      });
    });

    if (location.hash) {
      const tabId = location.hash.slice(1);
      if (document.getElementById(tabId)) switchTab(tabId);
    }
  </script>
