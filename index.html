<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面条团的面条的世界</title>
  <meta name="description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <meta name="keywords" content="表情包,微信表情,面条团,徒步名山,周游海外,节气团子,吃货团子">
  <meta name="author" content="面条团">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="canonical" href="https://stylejinmu.github.io/">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="面条团的面条的世界">
  <meta property="og:description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <meta property="og:url" content="https://stylejinmu.github.io/">
  <meta property="og:locale" content="zh_CN">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="面条团的面条的世界">
  <meta name="twitter:description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-card: #ffffff;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --accent: #8b7355;
      --accent-hover: #6d5a42;
      --border: #e8e6e3;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.1);
      --nav-w: 156px;
      --content-max: 960px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 左侧固定导航：上 logo（圆角）、名称、下菜单 */
    .page-body {
      margin-left: var(--nav-w);
      padding-top: 32px;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    .nav-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 0 4px;
    }

    .nav-brand-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .nav-brand-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: 0.04em;
      text-align: center;
      overflow-wrap: break-word;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    nav.tabs {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--nav-w);
      z-index: 100;
      padding: 28px 12px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      box-sizing: border-box;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    .tab {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 8px 8px 12px;
      border-radius: 6px;
      transition: color 0.2s ease, background-color 0.2s ease;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--accent);
      background-color: rgba(139, 115, 85, 0.08);
    }

    a.tab {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* 内容区域 */
    main {
      padding: 0;
    }

    .panel {
      padding: 48px 0 80px;
      display: block;
    }

    #articles.panel {
      padding: 24px 0 48px;
    }

    .panel-loading {
      color: var(--text-muted);
      font-size: 15px;
      margin: 0;
    }

    /* 表情包网格 */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 32px;
    }

    .sticker-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .sticker-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .sticker-cover-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .sticker-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sticker-qrcode {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sticker-cover-wrap:hover .sticker-qrcode {
      opacity: 1;
    }

    .sticker-qrcode img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .sticker-title {
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
    }

    /* 表情页：三格聚焦轮播（中正大、两侧缩小） */
    .sticker-page {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sticker-carousel {
      margin: 0 -12px;
      padding: 0 0 20px;
    }

    .sticker-carousel-status {
      font-size: 15px;
      color: var(--text);
      text-align: center;
      margin: 0 0 14px;
      line-height: 1.5;
    }

    .sticker-carousel-status strong {
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      color: var(--text);
    }

    .sticker-carousel-shell {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sticker-carousel-viewport {
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
      outline: none;
    }

    .sticker-carousel-viewport:focus-visible {
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
      border-radius: 16px;
    }

    .sticker-carousel-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: min(72vw, 340px);
      padding: 8px 0 16px;
      perspective: 1100px;
      perspective-origin: 50% 42%;
    }

    .sticker-carousel-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vw, 24px);
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .sticker-carousel-slot {
      flex: 1 1 28%;
      max-width: 228px;
      min-width: 0;
      transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
      transform: scale(0.9);
      opacity: 0.94;
      cursor: pointer;
    }

    .sticker-carousel-slot .sticker-card {
      margin: 0 auto;
      max-width: 100%;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
    }

    .sticker-carousel-slot--main {
      flex: 1 1 40%;
      max-width: 280px;
      transform: scale(1);
      opacity: 1;
      z-index: 2;
      cursor: default;
    }

    .sticker-carousel-slot--main .sticker-card {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.14);
    }

    .sticker-carousel-slot--main .sticker-card:hover {
      transform: translateY(-3px);
    }

    .sticker-carousel-slot--side .sticker-card:hover {
      transform: translateY(-2px);
    }

    .sticker-carousel-slot--empty {
      visibility: hidden;
      pointer-events: none;
      cursor: default;
    }

    .sticker-carousel-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--accent);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sticker-carousel-btn:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-hover);
    }

    .sticker-carousel-btn:active {
      transform: scale(0.96);
    }

    .sticker-carousel-dots {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 0 12px;
    }

    .sticker-carousel-dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .sticker-carousel-dot:hover {
      background: rgba(139, 115, 85, 0.45);
    }

    .sticker-carousel-dot.is-active {
      background: var(--accent);
      transform: scale(1.25);
      box-shadow: 0 0 0 2px rgba(139, 115, 85, 0.25);
    }

    @media (max-width: 600px) {
      .sticker-carousel-btn {
        width: 34px;
        height: 34px;
        font-size: 18px;
      }

      .sticker-carousel {
        margin: 0 -8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sticker-carousel-slot {
        transition: none;
      }

      .sticker-carousel-slot--main .sticker-card:hover,
      .sticker-carousel-slot--side .sticker-card:hover {
        transform: none;
      }
    }

    /* 文章列表 */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .article-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .article-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .article-card-inner {
      display: flex;
      gap: 20px;
      padding: 10px;
    }

    .article-card-cover {
      flex-shrink: 0;
      width: 180px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--border);
      position: relative;
    }

    .article-card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .article-card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
      background: linear-gradient(135deg, #e8e6e3 0%, #f0eeeb 100%);
    }

    .article-card-meta {
      flex: 1;
      min-width: 0;
    }

    .article-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .article-card-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-card-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .article-card-inner {
        flex-direction: column;
      }

      .article-card-cover {
        width: 100%;
        height: 160px;
      }
    }

    /* 联系我 */
    .contact-panel {
      text-align: center;
      padding: 60px 24px;
    }

    .contact-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .contact-email {
      font-size: 20px;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--accent-hover);
    }

    /* Doodle 面板 */
    .doodle-header {
      margin-bottom: 24px;
    }

    .doodle-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .doodle-feature {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    .doodle-feature-img-wrap {
      margin: 0 auto 24px;
      max-width: 560px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
    }

    .doodle-feature-img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      vertical-align: middle;
    }

    .doodle-prose {
      font-size: 16px;
      line-height: 1.85;
      color: var(--text);
    }

    .doodle-prose p {
      margin: 0 0 1.15em;
    }

    .doodle-prose p:last-child {
      margin-bottom: 0;
    }

    .doodle-history-cta {
      margin-top: 28px;
    }

    .doodle-history-cta a {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease;
    }

    .doodle-history-cta a:hover {
      color: var(--accent-hover);
    }

    .doodle-history-cta a::after {
      content: '→';
      font-family: system-ui, sans-serif;
      font-weight: 400;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      :root {
        --nav-w: 108px;
      }

      nav.tabs {
        left: 0;
        padding: 20px 8px 16px;
      }

      .nav-brand {
        margin-bottom: 20px;
        gap: 8px;
      }

      .nav-brand-logo {
        width: 44px;
        height: 44px;
      }

      .nav-brand-name {
        font-size: 13px;
        letter-spacing: 0.03em;
      }

      .page-body {
        margin-left: var(--nav-w);
        padding-top: 24px;
      }

      .tab {
        font-size: 14px;
        padding: 6px 4px 6px 8px;
      }
    }

    @media (max-width: 600px) {
      .sticker-carousel-stage {
        min-height: min(78vw, 300px);
      }

      .sticker-carousel-row {
        gap: 6px;
      }

      .sticker-carousel-slot {
        transform: scale(0.86);
      }

      .sticker-carousel-slot--main {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <nav class="tabs" aria-label="主导航">
    <div class="nav-brand">
      <img class="nav-brand-logo" src="image/logo.png" alt="面条团的面条">
      <span class="nav-brand-name">面条团的面条</span>
    </div>
    <div class="nav-menu">
      <div class="tab" data-tab="doodle">Doodle</div>
      <div class="tab" data-tab="articles">文章</div>
      <div class="tab" data-tab="stickers">表情</div>
      <div class="tab" data-tab="contact">联系我</div>
    </div>
  </nav>

  <div class="page-body">
    <div class="container">
      <main>
        <section class="panel active" id="doodle" aria-live="polite">
          <p class="panel-loading">加载中…</p>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      var TAB_IDS = ['doodle', 'articles', 'stickers', 'contact'];
      var CONTENT_PREFIX = 'content/';
      var panelEl = document.querySelector('main > .panel');
      var cache = Object.create(null);
      var loadSeq = 0;

      function navLabel(tabId) {
        var labels = { doodle: 'Doodle', articles: '文章', stickers: '表情', contact: '联系我' };
        return labels[tabId] || tabId;
      }

      function updateNav(tabId) {
        document.querySelectorAll('.tab[data-tab]').forEach(function (t) {
          if (t.dataset.tab === tabId) t.setAttribute('aria-current', 'page');
          else t.removeAttribute('aria-current');
        });
      }

      function fetchFragment(tabId) {
        if (cache[tabId]) return Promise.resolve(cache[tabId]);
        return fetch(CONTENT_PREFIX + tabId + '.html').then(function (res) {
          if (!res.ok) throw new Error(res.status);
          return res.text();
        }).then(function (html) {
          cache[tabId] = html;
          return html;
        });
      }

      function applyPanel(tabId, html) {
        panelEl.id = tabId;
        panelEl.innerHTML = html;
        panelEl.setAttribute('aria-label', navLabel(tabId));
        if (tabId === 'stickers') {
          requestAnimationFrame(function () {
            initStickerCarousel(panelEl);
          });
        }
      }

      function initStickerCarousel(root) {
        var showcase = root.querySelector('.sticker-showcase');
        var grid = root.querySelector('.sticker-grid');
        if (!showcase || !grid) return;
        var cards = [].slice.call(grid.querySelectorAll('.sticker-card'));
        var n = cards.length;
        if (!n) return;

        var currentIdx = 0;
        var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var slideDir = 0;
        var slideAnimGen = 0;
        var slideRollHandler1 = null;
        var slideRollHandler2 = null;
        var slideFallbackTimer = null;

        function escapeStickerTitle(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        var carousel = document.createElement('div');
        carousel.className = 'sticker-carousel';
        carousel.innerHTML =
          '<p class="sticker-carousel-status" aria-live="polite"></p>' +
          '<div class="sticker-carousel-shell">' +
          '<button type="button" class="sticker-carousel-btn sticker-carousel-prev" aria-label="上一张">‹</button>' +
          '<div class="sticker-carousel-viewport" tabindex="0" role="region" aria-roledescription="轮播">' +
          '<div class="sticker-carousel-stage">' +
          '<div class="sticker-carousel-row">' +
          '<div class="sticker-carousel-slot sticker-carousel-slot--prev"></div>' +
          '<div class="sticker-carousel-slot sticker-carousel-slot--main"></div>' +
          '<div class="sticker-carousel-slot sticker-carousel-slot--next"></div>' +
          '</div></div></div>' +
          '<button type="button" class="sticker-carousel-btn sticker-carousel-next" aria-label="下一张">›</button>' +
          '</div>' +
          '<div class="sticker-carousel-dots" role="tablist" aria-label="跳转到指定表情"></div>';

        var statusEl = carousel.querySelector('.sticker-carousel-status');
        var viewport = carousel.querySelector('.sticker-carousel-viewport');
        var dotsWrap = carousel.querySelector('.sticker-carousel-dots');
        var prevBtn = carousel.querySelector('.sticker-carousel-prev');
        var nextBtn = carousel.querySelector('.sticker-carousel-next');
        var prevSlot = carousel.querySelector('.sticker-carousel-slot--prev');
        var mainSlot = carousel.querySelector('.sticker-carousel-slot--main');
        var nextSlot = carousel.querySelector('.sticker-carousel-slot--next');
        var stage = carousel.querySelector('.sticker-carousel-stage');
        var row = carousel.querySelector('.sticker-carousel-row');

        showcase.appendChild(carousel);

        cards.forEach(function (card, i) {
          var dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'sticker-carousel-dot';
          var titleText = (card.querySelector('.sticker-title') || {}).textContent || '';
          dot.setAttribute('aria-label', '第 ' + (i + 1) + ' 张：' + titleText.trim());
          dot.setAttribute('role', 'tab');
          dotsWrap.appendChild(dot);
        });

        var dots = dotsWrap.querySelectorAll('.sticker-carousel-dot');

        function updateDots() {
          if (!viewport.isConnected) return;
          dots.forEach(function (d, j) {
            var on = j === currentIdx;
            d.classList.toggle('is-active', on);
            d.setAttribute('aria-selected', on ? 'true' : 'false');
          });
        }

        function clearSlideAnimTimers() {
          if (slideFallbackTimer) {
            clearTimeout(slideFallbackTimer);
            slideFallbackTimer = null;
          }
        }

        function clearSlideListeners() {
          if (slideRollHandler1) {
            row.removeEventListener('transitionend', slideRollHandler1);
            slideRollHandler1 = null;
          }
          if (slideRollHandler2) {
            row.removeEventListener('transitionend', slideRollHandler2);
            slideRollHandler2 = null;
          }
        }

        function resetRowTransform() {
          row.style.transition = '';
          row.style.transform = '';
        }

        function rollT(ry, rx, tz, sc) {
          return (
            'rotateY(' +
            ry +
            'deg) rotateX(' +
            rx +
            'deg) translateZ(' +
            tz +
            'px) scale(' +
            sc +
            ')'
          );
        }

        function updateStatus() {
          var titleText = (cards[currentIdx].querySelector('.sticker-title') || {}).textContent || '';
          titleText = titleText.trim() || '未命名';
          statusEl.innerHTML =
            '当前：' +
            '<strong>' +
            escapeStickerTitle(titleText) +
            '</strong>（' +
            (currentIdx + 1) +
            ' / ' +
            n +
            '）';
        }

        function swapSlotContent() {
          prevSlot.className = 'sticker-carousel-slot sticker-carousel-slot--prev';
          mainSlot.className = 'sticker-carousel-slot sticker-carousel-slot--main';
          nextSlot.className = 'sticker-carousel-slot sticker-carousel-slot--next';
          prevSlot.innerHTML = '';
          mainSlot.innerHTML = '';
          nextSlot.innerHTML = '';

          if (n === 1) {
            prevSlot.classList.add('sticker-carousel-slot--empty');
            nextSlot.classList.add('sticker-carousel-slot--empty');
            mainSlot.appendChild(cards[0].cloneNode(true));
          } else if (n === 2) {
            prevSlot.classList.add('sticker-carousel-slot--side');
            nextSlot.classList.add('sticker-carousel-slot--side');
            var other = 1 - currentIdx;
            prevSlot.appendChild(cards[other].cloneNode(true));
            mainSlot.appendChild(cards[currentIdx].cloneNode(true));
            nextSlot.appendChild(cards[other].cloneNode(true));
          } else {
            prevSlot.classList.add('sticker-carousel-slot--side');
            nextSlot.classList.add('sticker-carousel-slot--side');
            var pi = (currentIdx - 1 + n) % n;
            var ni = (currentIdx + 1) % n;
            prevSlot.appendChild(cards[pi].cloneNode(true));
            mainSlot.appendChild(cards[currentIdx].cloneNode(true));
            nextSlot.appendChild(cards[ni].cloneNode(true));
          }

          viewport.setAttribute('aria-label', '表情封面轮播，共 ' + n + ' 张，当前第 ' + (currentIdx + 1) + ' 张');
          updateDots();
          updateStatus();
        }

        function render(options) {
          var useAnim = options && options.animate && !reduceMotion && n > 1 && slideDir !== 0;

          if (!useAnim) {
            clearSlideListeners();
            clearSlideAnimTimers();
            resetRowTransform();
            swapSlotContent();
            slideDir = 0;
            return;
          }

          slideAnimGen++;
          var gen = slideAnimGen;
          clearSlideListeners();
          clearSlideAnimTimers();
          resetRowTransform();
          void row.offsetHeight;

          var dir = slideDir;
          var rotY = 26;
          var rotX = 3.2 * dir;
          var tz = -42;
          var scMid = 0.93;

          row.style.transition = 'transform 0.3s cubic-bezier(0.45, 0, 0.55, 1)';
          row.style.transform = rollT(-rotY * dir, rotX, tz, scMid);

          slideRollHandler1 = function (e) {
            if (e.target !== row || e.propertyName !== 'transform') return;
            if (gen !== slideAnimGen) return;
            row.removeEventListener('transitionend', slideRollHandler1);
            slideRollHandler1 = null;

            swapSlotContent();

            row.style.transition = 'none';
            row.style.transform = rollT(rotY * dir, -rotX, tz, scMid);
            void row.offsetHeight;
            row.style.transition = 'transform 0.38s cubic-bezier(0.22, 1, 0.36, 1)';
            row.style.transform = rollT(0, 0, 0, 1);

            slideRollHandler2 = function (e2) {
              if (e2.target !== row || e2.propertyName !== 'transform') return;
              if (gen !== slideAnimGen) return;
              clearSlideAnimTimers();
              row.removeEventListener('transitionend', slideRollHandler2);
              slideRollHandler2 = null;
              resetRowTransform();
              slideDir = 0;
            };
            row.addEventListener('transitionend', slideRollHandler2);
          };
          row.addEventListener('transitionend', slideRollHandler1);

          slideFallbackTimer = setTimeout(function () {
            slideFallbackTimer = null;
            if (gen !== slideAnimGen || !viewport.isConnected) return;
            clearSlideListeners();
            swapSlotContent();
            resetRowTransform();
            slideDir = 0;
          }, 900);
        }

        function goTo(idx) {
          var next = ((idx % n) + n) % n;
          if (next === currentIdx) return;
          var raw = next - currentIdx;
          if (raw > n / 2) raw -= n;
          if (raw < -n / 2) raw += n;
          if (Math.abs(raw) === 1) {
            slideDir = raw > 0 ? 1 : -1;
          } else {
            slideDir = 0;
          }
          currentIdx = next;
          render({ animate: true });
        }

        prevBtn.addEventListener('click', function () {
          if (n <= 1) return;
          goTo(currentIdx - 1);
        });
        nextBtn.addEventListener('click', function () {
          if (n <= 1) return;
          goTo(currentIdx + 1);
        });
        dots.forEach(function (dot, i) {
          dot.addEventListener('click', function () {
            goTo(i);
          });
        });

        viewport.addEventListener('keydown', function (e) {
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevBtn.click();
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextBtn.click();
          }
        });

        row.addEventListener('click', function (e) {
          if (n <= 1) return;
          var slot = e.target.closest('.sticker-carousel-slot');
          if (!slot || slot.classList.contains('sticker-carousel-slot--main')) return;
          if (slot.classList.contains('sticker-carousel-slot--empty')) return;
          if (slot.classList.contains('sticker-carousel-slot--prev')) {
            goTo(currentIdx - 1);
          } else if (slot.classList.contains('sticker-carousel-slot--next')) {
            goTo(currentIdx + 1);
          }
        });

        render({ animate: false });
      }

      function switchTab(tabId) {
        if (TAB_IDS.indexOf(tabId) === -1) return;
        var seq = ++loadSeq;
        updateNav(tabId);
        panelEl.innerHTML = '<p class="panel-loading">加载中…</p>';
        fetchFragment(tabId).then(function (html) {
          if (seq !== loadSeq) return;
          applyPanel(tabId, html);
        }).catch(function () {
          if (seq !== loadSeq) return;
          panelEl.innerHTML = '<p class="panel-loading">内容加载失败，请刷新重试。</p>';
        });
      }

      document.querySelectorAll('.tab[data-tab]').forEach(function (tab) {
        tab.addEventListener('click', function () {
          var id = tab.dataset.tab;
          switchTab(id);
          history.replaceState(null, '', '#' + id);
        });
      });

      window.addEventListener('hashchange', function () {
        var id = location.hash.slice(1);
        if (TAB_IDS.indexOf(id) !== -1) switchTab(id);
      });

      var initial = location.hash && TAB_IDS.indexOf(location.hash.slice(1)) !== -1
        ? location.hash.slice(1)
        : 'doodle';
      switchTab(initial);
      if (!location.hash || TAB_IDS.indexOf(location.hash.slice(1)) === -1) {
        history.replaceState(null, '', '#' + initial);
      }
    })();
  </script>
</body>
</html>
