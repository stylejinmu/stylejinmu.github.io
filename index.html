<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面条团的面条的世界</title>
  <meta name="description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <meta name="keywords" content="表情包,微信表情,面条团,徒步名山,周游海外,节气团子,吃货团子">
  <meta name="author" content="面条团">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="canonical" href="https://stylejinmu.github.io/">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="面条团的面条的世界">
  <meta property="og:description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <meta property="og:url" content="https://stylejinmu.github.io/">
  <meta property="og:locale" content="zh_CN">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="面条团的面条的世界">
  <meta name="twitter:description" content="面条团的表情包世界，包含徒步名山、周游海外、节气团子、吃货团子等多款微信表情专辑，欢迎下载使用。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-card: #ffffff;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --accent: #8b7355;
      --accent-hover: #6d5a42;
      --border: #e8e6e3;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.1);
      --nav-w: 156px;
      --content-max: 960px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 左侧固定导航：上 logo（圆角）、名称、下菜单 */
    .page-body {
      margin-left: var(--nav-w);
      padding-top: 32px;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    .nav-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 0 4px;
    }

    .nav-brand-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .nav-brand-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: 0.04em;
      text-align: center;
      overflow-wrap: break-word;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    nav.tabs {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--nav-w);
      z-index: 100;
      padding: 28px 12px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      box-sizing: border-box;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    .tab {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 8px 8px 12px;
      border-radius: 6px;
      transition: color 0.2s ease, background-color 0.2s ease;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--accent);
      background-color: rgba(139, 115, 85, 0.08);
    }

    a.tab {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* 内容区域 */
    main {
      padding: 0;
    }

    .panel {
      padding: 48px 0 80px;
      display: block;
    }

    #articles.panel {
      padding: 24px 0 48px;
    }

    .panel-loading {
      color: var(--text-muted);
      font-size: 15px;
      margin: 0;
    }

    /* 表情包网格 */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 32px;
    }

    .sticker-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .sticker-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .sticker-cover-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .sticker-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sticker-qrcode {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sticker-cover-wrap:hover .sticker-qrcode {
      opacity: 1;
    }

    .sticker-qrcode img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .sticker-title {
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
    }

    /* 文章列表 */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .article-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .article-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .article-card-inner {
      display: flex;
      gap: 20px;
      padding: 10px;
    }

    .article-card-cover {
      flex-shrink: 0;
      width: 180px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--border);
      position: relative;
    }

    .article-card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .article-card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
      background: linear-gradient(135deg, #e8e6e3 0%, #f0eeeb 100%);
    }

    .article-card-meta {
      flex: 1;
      min-width: 0;
    }

    .article-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .article-card-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-card-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .article-card-inner {
        flex-direction: column;
      }

      .article-card-cover {
        width: 100%;
        height: 160px;
      }
    }

    /* 联系我 */
    .contact-panel {
      text-align: center;
      padding: 60px 24px;
    }

    .contact-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .contact-email {
      font-size: 20px;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--accent-hover);
    }

    /* Doodle 面板 */
    .doodle-header {
      margin-bottom: 24px;
    }

    .doodle-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .doodle-feature {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    .doodle-feature-img-wrap {
      margin: 0 0 24px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
    }

    .doodle-feature-img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
    }

    .doodle-prose {
      font-size: 16px;
      line-height: 1.85;
      color: var(--text);
    }

    .doodle-prose p {
      margin: 0 0 1.15em;
    }

    .doodle-prose p:last-child {
      margin-bottom: 0;
    }

    .doodle-history-cta {
      margin-top: 28px;
    }

    .doodle-history-cta a {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease;
    }

    .doodle-history-cta a:hover {
      color: var(--accent-hover);
    }

    .doodle-history-cta a::after {
      content: '→';
      font-family: system-ui, sans-serif;
      font-weight: 400;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      :root {
        --nav-w: 108px;
      }

      nav.tabs {
        left: 0;
        padding: 20px 8px 16px;
      }

      .nav-brand {
        margin-bottom: 20px;
        gap: 8px;
      }

      .nav-brand-logo {
        width: 44px;
        height: 44px;
      }

      .nav-brand-name {
        font-size: 13px;
        letter-spacing: 0.03em;
      }

      .page-body {
        margin-left: var(--nav-w);
        padding-top: 24px;
      }

      .tab {
        font-size: 14px;
        padding: 6px 4px 6px 8px;
      }
    }

    @media (max-width: 600px) {
      .sticker-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <nav class="tabs" aria-label="主导航">
    <div class="nav-brand">
      <img class="nav-brand-logo" src="image/logo.png" alt="面条团的面条">
      <span class="nav-brand-name">面条团的面条</span>
    </div>
    <div class="nav-menu">
      <div class="tab" data-tab="doodle">Doodle</div>
      <div class="tab" data-tab="articles">文章</div>
      <div class="tab" data-tab="stickers">表情</div>
      <div class="tab" data-tab="contact">联系我</div>
    </div>
  </nav>

  <div class="page-body">
    <div class="container">
      <main>
        <section class="panel active" id="doodle" aria-live="polite">
          <p class="panel-loading">加载中…</p>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      var TAB_IDS = ['doodle', 'articles', 'stickers', 'contact'];
      var CONTENT_PREFIX = 'content/';
      var panelEl = document.querySelector('main > .panel');
      var cache = Object.create(null);
      var loadSeq = 0;

      function navLabel(tabId) {
        var labels = { doodle: 'Doodle', articles: '文章', stickers: '表情', contact: '联系我' };
        return labels[tabId] || tabId;
      }

      function updateNav(tabId) {
        document.querySelectorAll('.tab[data-tab]').forEach(function (t) {
          if (t.dataset.tab === tabId) t.setAttribute('aria-current', 'page');
          else t.removeAttribute('aria-current');
        });
      }

      function fetchFragment(tabId) {
        if (cache[tabId]) return Promise.resolve(cache[tabId]);
        return fetch(CONTENT_PREFIX + tabId + '.html').then(function (res) {
          if (!res.ok) throw new Error(res.status);
          return res.text();
        }).then(function (html) {
          cache[tabId] = html;
          return html;
        });
      }

      function applyPanel(tabId, html) {
        panelEl.id = tabId;
        panelEl.innerHTML = html;
        panelEl.setAttribute('aria-label', navLabel(tabId));
      }

      function switchTab(tabId) {
        if (TAB_IDS.indexOf(tabId) === -1) return;
        var seq = ++loadSeq;
        updateNav(tabId);
        panelEl.innerHTML = '<p class="panel-loading">加载中…</p>';
        fetchFragment(tabId).then(function (html) {
          if (seq !== loadSeq) return;
          applyPanel(tabId, html);
        }).catch(function () {
          if (seq !== loadSeq) return;
          panelEl.innerHTML = '<p class="panel-loading">内容加载失败，请刷新重试。</p>';
        });
      }

      document.querySelectorAll('.tab[data-tab]').forEach(function (tab) {
        tab.addEventListener('click', function () {
          var id = tab.dataset.tab;
          switchTab(id);
          history.replaceState(null, '', '#' + id);
        });
      });

      window.addEventListener('hashchange', function () {
        var id = location.hash.slice(1);
        if (TAB_IDS.indexOf(id) !== -1) switchTab(id);
      });

      var initial = location.hash && TAB_IDS.indexOf(location.hash.slice(1)) !== -1
        ? location.hash.slice(1)
        : 'doodle';
      switchTab(initial);
      if (!location.hash || TAB_IDS.indexOf(location.hash.slice(1)) === -1) {
        history.replaceState(null, '', '#' + initial);
      }
    })();
  </script>
</body>
</html>
