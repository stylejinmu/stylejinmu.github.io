<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-card: #ffffff;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --accent: #8b7355;
      --accent-hover: #6d5a42;
      --border: #e8e6e3;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 顶部 Tab 导航 */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      gap: 48px;
      justify-content: center;
    }

    .tab {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 0;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    /* 内容区域 */
    main {
      padding: 48px 0 80px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 表情包网格 */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 32px;
    }

    .sticker-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .sticker-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .sticker-cover-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .sticker-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sticker-qrcode {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sticker-cover-wrap:hover .sticker-qrcode {
      opacity: 1;
    }

    .sticker-qrcode img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .sticker-title {
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
    }

    /* 联系我 */
    .contact-panel {
      text-align: center;
      padding: 60px 24px;
    }

    .contact-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .contact-email {
      font-size: 20px;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--accent-hover);
    }

    @media (max-width: 600px) {
      .tabs {
        gap: 32px;
      }

      .tab {
        font-size: 16px;
      }

      .sticker-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }
  </style>
</head>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
