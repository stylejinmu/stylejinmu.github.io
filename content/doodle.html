  <h1 class="doodle-title">清明节</h1>
</header>
<div class="doodle-feature">
  <figure class="doodle-feature-img-wrap">
    <img class="doodle-feature-img" src="image/doodle/qingming_festival_2026.png" alt="清明时节主题插画" width="750" height="400" loading="lazy">
  </figure>
  <div class="doodle-prose">
    <p>清明时节，春风和煦，万物吐故纳新。这不仅是一个缅怀先人、寄托哀思的肃穆时刻，更是踏青赏春、感受生命律动的时节。</p>
    <p>在这烟雨蒙蒙的日子里，我们停下匆匆的脚步，回望来时的路。一束素菊，一缕清香，承载着对故人的无尽思念与深深敬意。那些曾经的温暖与教诲，如同春日里的微风，拂过心田，化作前行的力量。</p>
    <p>同时，清明也提醒着我们珍惜当下。在缅怀中感恩，在春光中前行。让我们带着对生命的敬畏与热爱，拥抱这生机勃勃的春天，让心灵在宁静与平和中得到慰藉与升华。愿逝者安息，生者如斯，岁岁清明，皆是清明。</p>
  </div>
</div>
