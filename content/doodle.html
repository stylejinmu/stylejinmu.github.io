  <h1 class="doodle-title">立夏</h1>
</header>
<div class="doodle-feature">
  <figure class="doodle-feature-img-wrap">
    <img class="doodle-feature-img" src="image/doodle/start_of_summer_2026.png" alt="立夏时节主题插画" width="750" height="400" loading="lazy">
  </figure>
  <div class="doodle-prose">
    <p>立夏是夏季的第一个节气，通常在每年公历五月五日至七日前后交节。《月令七十二候集解》有言：“立夏，四月节。物至此时皆假大也。”意谓万物到此时已长大、成形，春生之气转为夏长之势。</p>
    <p>从物候上看，一候蝼蝈鸣，二候蚯蚓出，三候王瓜生——田间地头的声响与生命活动更趋活跃。民间向来重视这一节，有尝新、吃立夏饭、吃蛋等习俗，寓意思念丰收与身强体健。气温渐升、湿度增大的时节，也宜清淡饮食、适度活动，以顺应由春入夏的阳气升发。</p>
    <p>春尽夏始，长日将临；这是一段从生发走向繁茂的节令，天地在明朗与温热中，为新一季的生长拉开序幕。</p>
  </div>
</div>
