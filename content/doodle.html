</header>
<div class="doodle-feature">
  <figure class="doodle-feature-img-wrap">
    <img class="doodle-feature-img" src="image/doodle/labour_day_2026.png" alt="五一劳动节主题插画" width="750" height="400" loading="lazy">

  <div class="doodle-prose">
    <p>五月的阳光格外明媚，空气中弥漫着劳动的芬芳。每一座拔地而起的高楼，每一片金黄饱满的麦田，每一个被治愈的生命，每一颗被点亮的心灵，背后都是无数劳动者日复一日的坚守与付出。</p>
    <p>劳动，是最朴素的语言，也是最有力的表达。建筑工人用双手丈量城市的高度，医护人员用专注守护生命的温度，教师用耐心传递知识的亮度，农民用汗水浇灌土地的厚度，工程师用智慧推动时代的速度。每一种职业都值得被尊重，每一份努力都值得被看见。</p>
    <p>五一劳动节，向所有辛勤劳动的人们致以最诚挚的敬意。愿你们在这个属于自己的节日里，放下疲惫，享受片刻的宁静与欢愉。劳动创造美好，奋斗成就未来——五一劳动节快乐！</p>
  </div>
