</header>
<div class="doodle-feature">
  <figure class="doodle-feature-img-wrap">
    <img class="doodle-feature-img" src="image/doodle/guyu_2026.png" alt="谷雨时节主题插画" width="750" height="400" loading="lazy">

  <div class="doodle-prose">
    <p>谷雨是春季的最后一个节气，通常出现在每年四月十九日至二十一日前后。此时降水明显增多，正如“雨生百谷”所说，充沛的雨水有利于谷类作物生长，也让田野进入更加繁忙而蓬勃的时节。</p>
    <p>从物候来看，谷雨前后常见浮萍始生、鸣鸠拂羽、戴胜降于桑等景象，意味着暮春已深，万物由柔嫩走向丰盛。在传统农事中，谷雨不仅关系播种与管护，也提醒人们顺应时令，注意祛湿养脾、起居有常。</p>
    <p>这是一段带着雨意与生机的节令：春将尽，夏将近，天地在润泽中酝酿新的丰收。</p>
  </div>
