  <div class="doodle-prose">
    <p>立夏时节，夏天的清凉</p>
    <p>立夏，是二十四节气中第七个节气，也是夏季的第一个节气。斗指东南，太阳黄经达45°，万物至此皆长大，夏日的序章就此悄然翻开。</p>
    <p>荷塘里，粉白的莲花次第绽放，宽大的荷叶铺满水面，将一池碧水映得愈发清透。垂柳拂风，枝条轻摇，蜻蜓点水而过，留下细密的涟漪。亭台倚水而立，廊下清风徐来，带走了初夏的暑意，只剩一片沁人心脾的凉意。</p>
    <p>立夏不是酷暑，而是清凉的开始。趁着这一季荷风未老、蝉声未起，不妨放慢脚步，找一处水边，听风、看荷、感受夏日最初的温柔。愿你的每一个夏天，都有一片属于自己的清凉之地。</p>
  </div>
